			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "# Copies the GoogleService-Info plist matching this build's FLAVOR into the app\n# bundle. For Debug builds a missing per-flavor plist falls back to any\n# available one (local/simulator convenience). For Release/Profile builds a\n# missing per-flavor plist FAILS the build so a release can never ship the\n# wrong Firebase project.\nDEST=\"${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/GoogleService-Info.plist\"\nSRC=\"${SRCROOT}/config/GoogleService-Info-${FLAVOR}.plist\"\nif [ ! -f \"${SRC}\" ]; then\n  case \"${CONFIGURATION}\" in\n    Debug*)\n      FALLBACK=$(ls \"${SRCROOT}/config/\"GoogleService-Info-*.plist 2>/dev/null | head -1)\n      if [ -n \"${FALLBACK}\" ]; then\n        echo \"warning: ${SRC} not found; using $(basename \"${FALLBACK}\") for Debug FLAVOR=${FLAVOR}. Add config/GoogleService-Info-${FLAVOR}.plist for correct Firebase data.\"\n        SRC=\"${FALLBACK}\"\n      else\n        echo \"error: no GoogleService-Info-*.plist found under ios/config/.\"\n        exit 1\n      fi\n      ;;\n    *)\n      echo \"error: ${SRC} is required for ${CONFIGURATION}. Download GoogleService-Info.plist for the '${FLAVOR}' Firebase app and save it as config/GoogleService-Info-${FLAVOR}.plist.\"\n      exit 1\n      ;;\n  esac\nfi\ncp \"${SRC}\" \"${DEST}\"\necho \"Embedded $(basename \"${SRC}\") as GoogleService-Info.plist\"\n";
		};
